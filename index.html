<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hugo -- CX Portfolio Dashboard</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTUiIGZpbGw9IiNmNWNmNDYiLz48L3N2Zz4=">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f5f0;--card:#fff;--border:#d8d6d0;--text:#1a1a1a;--muted:#94a3b8;--subtle:#64748b;--hdr:#2d3f57;--green:#16a34a;--green-bg:#dcfce7;--green-lt:#f0fdf4;--amber:#d97706;--amber-bg:#fef9c3;--amber-lt:#fffbeb;--red:#dc2626;--red-bg:#fecaca;--red-lt:#fef2f2;--blue:#2563eb;--blue-bg:#dbeafe;--blue-lt:#eff6ff;--teal:#0d9488;--teal-bg:#e6f4f1;--gold:#c49b20;--sidebar-w:260px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;overflow:hidden;height:100vh}
.app{display:flex;height:100vh}.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden}.main{flex:1;overflow-y:auto;height:100vh}

/* Sidebar */
.sb-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;border-top:3px solid #f5cf46}
.sb-logo{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.sb-title{font-size:14px;font-weight:700}
.sb-search{width:100%;font-family:'DM Sans',sans-serif;font-size:11px;padding:6px 9px;border:1px solid var(--border);background:#fafaf8;margin-top:6px;outline:none}
.sb-search:focus{border-color:var(--teal)}
.sb-stats{display:flex;gap:1px;padding:6px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:#fafaf8}
.sb-stat{flex:1;text-align:center;padding:3px 0}
.sb-stat-v{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.sb-stat-v.green{color:var(--green)}.sb-stat-v.amber{color:var(--amber)}.sb-stat-v.red{color:var(--red)}
.sb-stat-l{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.sb-list{flex:1;overflow-y:auto;padding:2px 0}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;border-bottom:1px solid #f5f4f0;transition:background .1s}
.sb-item:hover{background:#fafaf8}
.sb-item.active{background:var(--teal-bg);border-left:3px solid var(--teal);padding-left:13px}
.sb-item.port{border-bottom:2px solid var(--border);background:#fafaf8;font-weight:600}.sb-item.port:hover{background:#f0f0ea}.sb-item.port.active{background:var(--teal-bg);border-left:3px solid var(--teal)}
.sb-g{width:28px;height:22px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;border-radius:2px;flex-shrink:0}
.sb-g.a{background:var(--green-bg);color:var(--green)}.sb-g.b{background:var(--blue-bg);color:var(--blue)}.sb-g.bw{background:var(--amber-bg);color:var(--amber)}.sb-g.c{background:var(--amber-bg);color:#b45309}.sb-g.d{background:var(--red-bg);color:var(--red)}.sb-g.na{background:#f1f5f9;color:var(--muted);font-size:8px}
.sb-nm{flex:1;min-width:0}.sb-nm-t{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-nm-m{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted)}
.sb-tr{font-size:9px;flex-shrink:0}.sb-tr.up{color:var(--green)}.sb-tr.down{color:var(--red)}.sb-tr.flat{color:var(--muted)}

/* Main panel */
.p-hdr{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px}
.bc{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.04em;color:var(--muted);margin-bottom:4px}.bc a{color:var(--teal);text-decoration:none;cursor:pointer}.bc a:hover{text-decoration:underline}
.p-title{font-size:20px;font-weight:700;letter-spacing:-.01em}
.p-sub{font-size:11px;color:var(--subtle);margin-top:1px}
.p-badge{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;padding:3px 8px;background:#f8f4e8;color:#8b7032;letter-spacing:.04em;margin-top:4px}
.p-tabs{display:flex;gap:0;background:#fafaf8;border-bottom:1px solid var(--border);padding:0 24px}
.p-tab{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding:9px 14px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.p-tab:hover{color:var(--subtle);background:var(--card)}.p-tab.act{color:var(--text);border-bottom-color:var(--text);background:var(--card)}
.p-body{padding:20px 24px 60px}
.back-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.04em;padding:5px 12px;border:1px solid var(--border);background:var(--card);color:var(--subtle);cursor:pointer;margin-right:12px}
.back-btn:hover{border-color:var(--teal);color:var(--teal)}

/* KPI bar - bottom aligned */
.kpi-bar{display:grid;gap:1px;background:var(--border)}
.kpi-bar.c6{grid-template-columns:repeat(6,1fr)}.kpi-bar.c7{grid-template-columns:repeat(7,1fr)}.kpi-bar.c5{grid-template-columns:repeat(5,1fr)}.kpi-bar.c4{grid-template-columns:repeat(4,1fr)}
.kb{background:var(--card);padding:14px 16px;display:flex;flex-direction:column;min-height:80px}
.kb-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);flex:1}
.kb-v{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;line-height:1;margin-top:auto}
.kb-s{font-size:10px;color:var(--subtle);margin-top:2px}
.kb.green .kb-v{color:var(--green)}.kb.amber .kb-v{color:var(--amber)}.kb.red .kb-v{color:var(--red)}

/* Filter/sort bar */
.ctrl-bar{background:var(--card);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.ctrl-bar label{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:1px}
.ctrl-bar select{font-family:'DM Sans',sans-serif;font-size:11px;padding:4px 8px;border:1px solid var(--border);background:var(--card);min-width:90px}
.ctrl-sep{width:1px;height:24px;background:var(--border)}

/* Summary table */
.s-tbl{width:100%;border-collapse:collapse;font-size:12px}
.s-tbl th{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.06em;background:var(--hdr);color:#fff;padding:7px 8px;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:5}
.s-tbl th.c,.s-tbl td.c{text-align:center}.s-tbl th.r,.s-tbl td.r{text-align:right}
.s-tbl td{padding:7px 8px;border-bottom:1px solid #eee;vertical-align:middle}
.s-tbl tr:hover td{background:#fafaf8}
.s-tbl tr.group-hdr td{background:#f1f5f9;font-family:'DM Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--subtle);border-bottom:2px solid var(--border);padding:6px 8px}
.s-tbl tr{cursor:pointer}
.s-tbl tr.group-hdr{cursor:default}
.s-tbl .pn{font-weight:600;white-space:nowrap}.s-tbl .pm-col{font-size:10px;color:var(--subtle);white-space:nowrap}
.s-tbl .rev-col{font-family:'DM Mono',monospace;font-size:11px}
.s-tbl .hc-col{font-family:'DM Mono',monospace;font-size:11px}

/* Sparkline */
.spark{display:inline-flex;align-items:flex-end;gap:1px;height:16px;vertical-align:middle}
.spark-bar{width:4px;background:var(--teal);border-radius:1px 1px 0 0;min-height:2px}

/* Grades inline */
.gi{display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;width:28px;height:20px;border-radius:2px}
.gi.a{background:var(--green-bg);color:var(--green)}.gi.b{background:var(--blue-bg);color:var(--blue)}.gi.bw{background:var(--amber-bg);color:var(--amber)}.gi.c{background:var(--amber-bg);color:#b45309}.gi.d{background:var(--red-bg);color:var(--red)}.gi.na{background:#f1f5f9;color:var(--muted);font-size:8px}
.gi-lg{font-family:'DM Mono',monospace;font-size:34px;font-weight:800;line-height:1}
.gi-lg.a{color:var(--green)}.gi-lg.b{color:var(--blue)}.gi-lg.bw{color:var(--amber)}.gi-lg.c{color:#b45309}.gi-lg.d{color:var(--red)}.gi-lg.na{color:var(--muted)}

/* Badge */
.badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.03em;padding:2px 6px;font-weight:600;white-space:nowrap;display:inline-block;vertical-align:middle;line-height:1.4}
.badge.ot{background:var(--green-bg);color:var(--green)}.badge.nf{background:var(--amber-bg);color:var(--amber)}.badge.ar{background:var(--red-bg);color:var(--red)}.badge.nw{background:#f1f5f9;color:var(--muted)}

/* Callout */
.co{border-left:3px solid var(--cc,var(--muted));background:var(--cb,#f8fafc);padding:10px 14px;margin-bottom:12px;font-size:12px;line-height:1.65;color:#475569}
.co strong{color:var(--text)}.co.amber{--cc:var(--amber);--cb:var(--amber-lt)}.co.green{--cc:var(--green);--cb:var(--green-lt)}.co.red{--cc:var(--red);--cb:var(--red-lt)}.co.teal{--cc:var(--teal);--cb:var(--teal-bg)}
.co-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;margin-bottom:2px}
.co.amber .co-l{color:var(--amber)}.co.green .co-l{color:var(--green)}.co.red .co-l{color:var(--red)}

/* Shared */
.sec-t{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee}
.card{background:var(--card);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
.two-col{display:grid;grid-template-columns:5fr 2fr;gap:16px;align-items:start}
.pulse{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.03em;font-weight:600;padding:2px 6px;display:inline-block}
.pulse.good{background:var(--green-bg);color:var(--green)}.pulse.ok{background:var(--blue-bg);color:var(--blue)}.pulse.fair{background:var(--amber-bg);color:var(--amber)}.pulse.poor{background:var(--red-bg);color:var(--red)}

.wf-tbl{width:100%;border-collapse:collapse;font-size:11px;margin:6px 0}
.wf-tbl th{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.06em;background:var(--hdr);color:#fff;padding:6px 8px;text-align:left}.wf-tbl th.c{text-align:center}.wf-tbl td.c{text-align:center}
.wf-tbl td{padding:6px 8px;border-bottom:1px solid #eee}.wf-tbl tr:hover td{background:#fafaf8}

.dw-hdr{padding:10px 14px;background:#f8f4e8;border-left:3px solid var(--gold);font-family:'DM Mono',monospace;font-size:9px;color:#8b7032;letter-spacing:.04em;margin-bottom:14px}

.kpi-row{display:grid;gap:10px;margin-bottom:16px}
.kpi-row.c5{grid-template-columns:repeat(5,1fr)}.kpi-row.c4{grid-template-columns:repeat(4,1fr)}.kpi-row.c3{grid-template-columns:repeat(3,1fr)}
.kpi{background:var(--card);border:1px solid var(--border);padding:12px 14px}
.kpi-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:flex;justify-content:space-between}
.kpi-v{font-family:'DM Mono',monospace;font-size:22px;font-weight:600;line-height:1.2}
.kpi-s{font-size:10px;color:var(--subtle);margin-top:2px}
.kpi.green{border-left:3px solid var(--green)}.kpi.amber{border-left:3px solid var(--amber)}.kpi.red{border-left:3px solid var(--red)}

/* Period selector */
.period-sel{display:flex;align-items:center;gap:8px;margin-left:auto}
.period-sel select{font-family:'DM Mono',monospace;font-size:10px;padding:4px 8px;border:1px solid var(--border);background:var(--card)}

@media(max-width:900px){.sidebar{width:200px;min-width:200px}.kpi-bar.c6{grid-template-columns:repeat(3,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>

</div>
<div class="main" id="mp"></div>
</div>
<script>
// ========== DATA ==========
const PERIOD = 'Week 16: April 7 - 12, 2026';
const PERIOD_SHORT = 'W16 | Apr 7-12, 2026';

// Industry benchmarks (from CEO check-in dashboard)
const BENCHMARKS = {
  tl: 15,     // 1 TL per 15 agents
  qa: 40,     // 1 QA per 40 agents
  pm: 50,     // 1 PM per 50 agents
  spm: 150,   // 1 SPM per 150 agents
};

// Salary reference (Lagos USD/mo equivalents; SA ~1.5x; US market rate for US staff)
const SALARIES = {
  agent: 257, qa: 359, tl: 493, atl: 493, pc: 682, pm: 1714, spm: 2500
};

// Per-project role data (from Small Projects Data - Headcount Sheet)
const ROLES = {
  'gh':{bill:433,actual:429,agents:397,qa:0,sme:0,atl:0,tl:32,ql:0,pc:0,otHours:420,otPct:6.5,otMoM:-2.1,pmHours:45,zohoPct:null,sites:[{name:'Lilly Lagos',bill:94,actual:117,buf:23,bufPct:24.5},{name:'Lilly SA (CPT+JHB)',bill:164,actual:178,buf:14,bufPct:8.5},{name:'Lilly MO',bill:175,actual:134,buf:-41,bufPct:-23.4},{name:'Gastro',bill:0,actual:0,buf:0,bufPct:0}]},
  'alm':{bill:111,actual:114,agents:101,qa:5,sme:0,atl:3,tl:4,ql:0,pc:1,otHours:180,otPct:4.2,otMoM:1.3,pmHours:40,zohoPct:null},
  'out':{bill:52,actual:85,agents:62,qa:4,sme:3,atl:4,tl:5,ql:1,pc:3,otHours:95,otPct:3.1,otMoM:-0.5,pmHours:38,zohoPct:null},
  'faire':{bill:39,actual:42,agents:30,qa:6,sme:0,atl:1,tl:3,ql:0,pc:2,otHours:45,otPct:2.8,otMoM:0.0,pmHours:20,zohoPct:null},
  'aurora':{bill:56,actual:56,agents:46,qa:6,sme:0,atl:0,tl:4,ql:0,pc:0,otHours:210,otPct:5.8,otMoM:3.2,pmHours:35,zohoPct:null},
  'curri':{bill:23,actual:31,agents:26,qa:3,sme:1,atl:0,tl:1,ql:0,pc:0,otHours:60,otPct:4.1,otMoM:0.8,pmHours:28,zohoPct:null},
  'csi':{bill:30,actual:31,agents:28,qa:1,sme:0,atl:0,tl:2,ql:0,pc:0,otHours:20,otPct:1.5,otMoM:-5.0,pmHours:15,zohoPct:null},
  'finix':{bill:15,actual:17,agents:15,qa:1,sme:0,atl:1,tl:0,ql:0,pc:0,otHours:40,otPct:5.2,otMoM:2.1,pmHours:22,zohoPct:null},
  '9am':{bill:0,actual:0,agents:0,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0,pmHours:15,zohoPct:null},
  'strh':{bill:6,actual:10,agents:8,qa:0,sme:0,atl:1,tl:0,ql:0,pc:1,otHours:5,otPct:2.0,otMoM:0.0,pmHours:8,zohoPct:null},
  'bask':{bill:12,actual:14,agents:13,qa:0,sme:0,atl:1,tl:0,ql:0,pc:0,otHours:25,otPct:3.5,otMoM:1.2,pmHours:12,zohoPct:null},
  'google':{bill:23,actual:23,agents:22,qa:0,sme:0,atl:1,tl:0,ql:0,pc:0,otHours:15,otPct:1.8,otMoM:0.0,pmHours:10,zohoPct:null},
  'kiddom':{bill:4,actual:5,agents:4,qa:0,sme:0,atl:0,tl:1,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:5,zohoPct:null},
  'sono':{bill:7,actual:9,agents:8,qa:0,sme:0,atl:0,tl:1,ql:0,pc:0,otHours:12,otPct:3.0,otMoM:0.5,pmHours:8,zohoPct:null},
  'userw':{bill:3,actual:3,agents:3,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:3,zohoPct:null},
  'writer':{bill:4,actual:4,agents:3,qa:0,sme:1,atl:0,tl:0,ql:0,pc:0,otHours:2,otPct:1.0,otMoM:0.0,pmHours:5,zohoPct:null},
  'pinata':{bill:3,actual:5,agents:4,qa:1,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:4,zohoPct:null},
  'fireclay':{bill:3,actual:5,agents:5,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:4,zohoPct:null},
  'main':{bill:2,actual:4,agents:3,qa:0,sme:0,atl:1,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:3,zohoPct:null},
  'sohookd':{bill:2,actual:2,agents:2,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:2,zohoPct:null},
  'topicals':{bill:1,actual:1,agents:1,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:2,zohoPct:null},
  'trc':{bill:1,actual:1,agents:1,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:2,zohoPct:null},
  'edhat':{bill:1,actual:1,agents:1,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:2,zohoPct:null},
  'kon':{bill:7,actual:8,agents:8,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:5,zohoPct:null},
  'supply':{bill:5,actual:6,agents:5,qa:0,sme:0,atl:0,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:3,zohoPct:null},

  'row':{bill:1,actual:1,agents:0,qa:0,sme:0,atl:1,tl:0,ql:0,pc:0,otHours:0,otPct:0,otMoM:0.0,pmHours:2,zohoPct:null},
};

// Calculate efficiency score for a project
function effScore(pid){
  const r=ROLES[pid];if(!r||r.agents===0)return{score:null,grade:'--',cls:'na'};
  const tlRatio=r.tl?r.agents/r.tl:null;
  const qaRatio=r.qa?r.agents/r.qa:null;
  const bufferPct=r.bill?((r.actual-r.bill)/r.bill*100):0;
  
  // TL score: 100 if ratio 15-20 (target), deduct for deviation
  let tlScore=70;
  if(tlRatio){if(tlRatio>=15&&tlRatio<=20)tlScore=100;else if(tlRatio>=12&&tlRatio<22)tlScore=85;else if(tlRatio>=10)tlScore=70;else tlScore=50}
  // QA score: client-driven; we give 100 if no Hugo QA (like GH) OR ratio 30-50
  let qaScore=80;
  if(r.qa===0)qaScore=100;
  else if(qaRatio){if(qaRatio>=30&&qaRatio<=50)qaScore=100;else if(qaRatio>=20&&qaRatio<60)qaScore=85;else if(qaRatio>=10)qaScore=65;else qaScore=50}
  // Buffer score: ideal 5-10%, penalize >15% or <0%
  let bufScore=70;
  if(bufferPct>=5&&bufferPct<=10)bufScore=100;else if(bufferPct>=0&&bufferPct<=15)bufScore=85;else if(bufferPct>15&&bufferPct<=25)bufScore=65;else bufScore=50;
  // OT score: <5% is fine, escalating penalty
  let otScore=100;
  if(r.otPct>=10)otScore=60;else if(r.otPct>=7)otScore=75;else if(r.otPct>=5)otScore=85;
  
  const score=Math.round(tlScore*.3+qaScore*.2+bufScore*.3+otScore*.2);
  return{score,grade:gr(score).g,cls:gr(score).c,tlRatio,qaRatio,bufferPct,tlScore,qaScore,bufScore,otScore};
}

// Calculate cost savings from right-sizing
function rightSizeSavings(pid){
  const r=ROLES[pid];if(!r||r.agents===0)return{tl:0,qa:0,buffer:0,total:0};
  const targetTL=Math.ceil(r.agents/BENCHMARKS.tl);
  const targetQA=r.qa>0?Math.ceil(r.agents/BENCHMARKS.qa):0;
  const excessTL=r.tl-targetTL;
  const excessQA=r.qa-targetQA;
  const excessBuffer=Math.max(0,(r.actual-r.bill)-Math.ceil(r.bill*0.10)); // over 10% buffer
  return{
    tl:excessTL*SALARIES.tl,
    qa:excessQA*SALARIES.qa,
    buffer:excessBuffer*SALARIES.agent,
    total:excessTL*SALARIES.tl+excessQA*SALARIES.qa+excessBuffer*SALARIES.agent,
    excessTL,excessQA,excessBuffer,targetTL,targetQA
  };
}

// ========== ENGINE ==========
const W={q:.25,s:.25,sp:.20,pr:.20,v:.10};
function hl(p){let t=0,w=0;for(let k of['q','s','sp','pr','v'])if(p[k]!=null){t+=p[k]*W[k];w+=W[k]}return w?Math.round(t/w):null}
function gr(s){if(s==null)return{g:'--',c:'na'};if(s>=90)return{g:'A',c:'a'};if(s>=85)return{g:'A-',c:'a'};if(s>=80)return{g:'B+',c:'b'};if(s>=75)return{g:'B',c:'bw'};if(s>=70)return{g:'B-',c:'bw'};if(s>=60)return{g:'C',c:'c'};return{g:'D',c:'d'}}
function sb(h){if(h==null)return'<span class="badge nw">NEW</span>';if(h>=80)return'<span class="badge ot">ON TRACK</span>';if(h>=70)return'<span class="badge nf">NEEDS FOCUS</span>';return'<span class="badge ar">AT RISK</span>'}
function sc(h){if(h==null)return'';if(h>=80)return'green';if(h>=70)return'amber';return'red'}
function ti(t){return t==='up'?'<span class="sb-tr up">&#9650;</span>':t==='down'?'<span class="sb-tr down">&#9660;</span>':'<span class="sb-tr flat">&#8212;</span>'}
function pt(p){const m={good:'good',ok:'ok',fair:'fair',poor:'poor'};return`<span class="pulse ${m[p]||'ok'}">${(p||'OK').toUpperCase()}</span>`}
function fr(v){if(!v)return'--';if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';if(v>=1e3)return'$'+(v/1e3).toFixed(1)+'K';return'$'+v}
function mp(c,p){if(!c||!p)return'';const v=((c-p)/p*100).toFixed(0);const cl=v>=0?'var(--green)':'var(--red)';return`<span style="color:${cl};font-size:10px">${v>0?'+':''}${v}%</span>`}
function gi(s){const g=gr(s);return`<span class="gi ${g.c}">${g.g}</span>`}
function gl(s){const g=gr(s);return`<span class="gi-lg ${g.c}">${g.g}</span>`}
function spark(hist){if(!hist||!hist.length)return'';const mx=Math.max(...hist.map(h=>h.h||h||0),1);return'<span class="spark">'+hist.map(h=>{const v=h.h||h||0;return`<span class="spark-bar" style="height:${Math.max(v/mx*16,2)}px"></span>`}).join('')+'</span>'}
function sz(hc){if(hc>=15)return'Tier A';return'Tier B'}

D.forEach(p=>{p.h=hl(p);p.hg=gr(p.h);p.sz=sz(p.bHC)});

// ========== SIDEBAR ==========
function rSB(f=''){
  const list=document.getElementById('sbL');
  const items=f?D.filter(p=>p.n.toLowerCase().includes(f.toLowerCase())):D;
  const sorted=[...items].sort((a,b)=>(b.rM||0)-(a.rM||0));
  let h=`<div class="sb-item port ${!AP?'active':''}" onclick="showP()"><span style="font-size:12px;margin-right:4px">&#9776;</span><div class="sb-nm"><div class="sb-nm-t">Portfolio Summary</div><div class="sb-nm-m">${D.length} projects</div></div></div>`;
  sorted.forEach(p=>{h+=`<div class="sb-item ${AP===p.id?'active':''}" onclick="selP('${p.id}')"><span class="sb-g ${p.hg.c}">${p.hg.g}</span><div class="sb-nm"><div class="sb-nm-t">${p.n}</div><div class="sb-nm-m">${p.ind}</div></div>${ti(p.tr)}</div>`});
  list.innerHTML=h;
  const ac=D.filter(p=>p.h!=null);
  document.getElementById('sOT').textContent=ac.filter(p=>p.h>=80).length;
  document.getElementById('sNF').textContent=ac.filter(p=>p.h>=70&&p.h<80).length;
  document.getElementById('sAR').textContent=ac.filter(p=>p.h<70).length;
}
function filterSB(v){rSB(v)}
function showP(){AP=null;rSB();rPort()}
function selP(id){AP=id;rSB();rOP(id)}

// ========== PORTFOLIO ==========
function sortD(arr,by){
  if(by==='rev')return[...arr].sort((a,b)=>(b.rM||0)-(a.rM||0));
  if(by==='hc')return[...arr].sort((a,b)=>b.bHC-a.bHC);
  if(by==='alpha')return[...arr].sort((a,b)=>a.n.localeCompare(b.n));
  if(by==='health')return[...arr].sort((a,b)=>(a.h||999)-(b.h||999));
  if(by==='industry')return[...arr].sort((a,b)=>a.ind.localeCompare(b.ind));
  return arr;
}

  h+=`<div class="kpi-bar c7"><div class="kb"><div class="kb-l">Active Projects</div><div class="kb-v">${D.length}</div></div><div class="kb green"><div class="kb-l">On Track</div><div class="kb-v">${ac.filter(p=>p.h>=80).length}</div></div><div class="kb amber"><div class="kb-l">Needs Focus</div><div class="kb-v">${ac.filter(p=>p.h>=70&&p.h<80).length}</div></div><div class="kb red"><div class="kb-l">At Risk</div><div class="kb-v">${ac.filter(p=>p.h<70).length}</div></div><div class="kb"><div class="kb-l">Billable HC</div><div class="kb-v">${tHC.toLocaleString()}</div></div><div class="kb"><div class="kb-l">Mar 2026 Revenue</div><div class="kb-v">${fr(tR)}</div></div><div class="kb"><div class="kb-l">2026 Est. ARR</div><div class="kb-v">${fr(tR*12)}</div></div></div>`;
  
  h+=`<div class="ctrl-bar"><div><label>Sort / Group By</label><select id="sortSel" onchange="sortBy=this.value;rPort()"><option value="rev" ${sortBy==='rev'?'selected':''}>Tier: Revenue</option><option value="hc" ${sortBy==='hc'?'selected':''}>Tier: Headcount</option><option value="health" ${sortBy==='health'?'selected':''}>Health Status</option><option value="alpha" ${sortBy==='alpha'?'selected':''}>Alphabetical</option><option value="industry" ${sortBy==='industry'?'selected':''}>Industry</option></select></div><div class="ctrl-sep"></div><div><label>Filter: Location</label><select id="fLoc" onchange="rPort()"><option value="">All Locations</option><option>Lagos</option><option>South Africa</option><option>Missouri</option><option>Kenya</option><option>Multi-site</option></select></div><div><label>Filter: Priority</label><select id="fPri" onchange="rPort()"><option value="">All</option><option>High</option><option>Med</option><option>Low</option></select></div><div><label>Filter: Status</label><select id="fStat" onchange="rPort()"><option value="">All</option><option value="ot">On Track</option><option value="nf">Needs Focus</option><option value="ar">At Risk</option></select></div></div>`;
  
  if(risks.length)h+=`<div style="padding:10px 24px 0"><div class="co amber"><div class="co-l">Attention Required</div><strong>${risks.length} project${risks.length>1?'s':''} below B threshold:</strong> ${risks.map(p=>`${p.n} (${p.hg.g})`).join(', ')}</div></div>`;
  
  // Specific critical flags
  h+=`<div style="padding:4px 24px 0"><div class="co red"><div class="co-l">Critical: Aurora Solar</div><strong>Client QA at 40-60% for 5 months (Nov-Mar).</strong> Internal QA shows 90% (calibration gap). Bottom of vendor network on quality. Largest US client bankruptcy will reduce volume; we take the brunt. Meeting tomorrow on implications.</div></div>`;
  h+=`<div style="padding:4px 24px 0"><div class="co red"><div class="co-l">Critical: Outschool Buffer</div><strong>85 actual vs 52 billable = 63% above billable.</strong> 33 people of buffer/overhead on a $100K/mo account. Deadline: end of April to right-size. Excess agents to be redeployed to BSG, Earnest, and new projects.</div></div>`;
  
  // Apply filters
  let filtered = [...D];
  const fLoc=document.getElementById('fLoc')?document.getElementById('fLoc').value:'';
  const fPri=document.getElementById('fPri')?document.getElementById('fPri').value:'';
  const fStat=document.getElementById('fStat')?document.getElementById('fStat').value:'';
  if(fLoc) filtered=filtered.filter(p=>p.loc.toLowerCase().includes(fLoc.toLowerCase()));
  if(fPri) filtered=filtered.filter(p=>p.pri===fPri);
  if(fStat==='ot') filtered=filtered.filter(p=>p.h!=null&&p.h>=80);
  if(fStat==='nf') filtered=filtered.filter(p=>p.h!=null&&p.h>=70&&p.h<80);
  if(fStat==='ar') filtered=filtered.filter(p=>p.h!=null&&p.h<70);
  
  const sorted=sortD(filtered,sortBy);
  
  // Dynamic grouping
  let groups={};
  if(sortBy==='rev'||sortBy==='hc'){
    groups={'Tier A':[],'Tier B':[]};
    sorted.forEach(p=>groups[p.sz].push(p));
  } else if(sortBy==='health'){
    groups={'At Risk (< 70)':[],'Needs Focus (70-79)':[],'On Track (80+)':[],'New / No Data':[]};
    sorted.forEach(p=>{if(p.h==null)groups['New / No Data'].push(p);else if(p.h<70)groups['At Risk (< 70)'].push(p);else if(p.h<80)groups['Needs Focus (70-79)'].push(p);else groups['On Track (80+)'].push(p)});
  } else if(sortBy==='industry'){
    sorted.forEach(p=>{if(!groups[p.ind])groups[p.ind]=[];groups[p.ind].push(p)});
  } else {
    groups={'All Projects':sorted};
  }
  
  // Direction bubble helper
  function db(curr,prev){const gray=' <span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:#f1f5f9;color:var(--muted);font-size:9px;text-align:center;line-height:16px;vertical-align:middle">&#8212;</span>';if(!curr||!prev)return gray;const d=curr-prev;if(d>0)return' <span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--green-bg);color:var(--green);font-size:9px;text-align:center;line-height:16px;vertical-align:middle" title="+'+((d/prev*100).toFixed(0))+'%">&#9650;</span>';if(d<0)return' <span style="display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--red-bg);color:var(--red);font-size:9px;text-align:center;line-height:16px;vertical-align:middle" title="'+(d/prev*100).toFixed(0)+'%">&#9660;</span>';return gray}
  
  h+=`<div style="padding:0 24px">`;

  for(const[label,items]of Object.entries(groups)){

            ${gNF?`<span style="display:inline-block;padding:2px 8px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;background:var(--amber-bg);color:var(--amber)">${gNF} Focus</span>`:''}

          </div>

          <div><div style="font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Monthly Rev</div><div style="font-size:20px;font-weight:700">${fr(gRev)} ${gRevP?`<span style="font-size:11px;color:${gRevDir==='up'?'var(--green)':'var(--red)'}">${gRevDir==='up'?'&#9650;':'&#9660;'} ${gRevPct>0?'+':''}${gRevPct}%</span>`:''}</div></div>
          <div><div style="font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)">Est. 2026 ARR</div><div style="font-size:20px;font-weight:700">${fr(gARR)}</div></div>
        </div>

      <div id="grp${gIdx}">
        <table class="s-tbl"><thead><tr><th style="width:150px">Project</th><th>Location</th><th class="c" style="width:44px">Health</th><th class="c" style="width:44px">Eff</th><th class="c">Quality</th><th class="c">CSAT</th><th class="c">Speed</th><th class="c">Adherence</th><th class="c">Trend</th><th class="c">Client</th><th class="r">HC #</th><th class="r">Buf %</th><th class="r">OT %</th><th class="r">Rev $</th><th class="r">ARR $</th><th class="c">Status</th></tr></thead><tbody>`;
    
    items.forEach(p=>{
      const arr=fr((p.rM||0)*12);
      const e=effScore(p.id);
      const effCell=e.score?gi(e.score):'<span class="gi na">--</span>';
      const r=ROLES[p.id];
      const bufPct=r&&r.bill?((r.actual-r.bill)/r.bill*100).toFixed(0):'--';

    wp+=`<tr style="background:#f1f5f9;font-weight:700"><td><strong>Portfolio Total</strong></td><td class="c">-</td><td class="c">${B.sites.reduce((s,x)=>s+x.agents,0)}</td><td class="c">-</td><td class="c">-</td><td class="c">-</td><td class="c">-</td><td class="c">-</td><td class="r">${fr(totB)}</td><td class="r">${fr(totE)}</td><td class="r" style="color:${totClr}">${totD>0?'+':''}${fr(totD)}</td><td class="r" style="color:${totClr}">${totD>0?'+':''}${totPct}%</td></tr>`;
    wp+=`</table>`;
    
    // Matrices
    function renderMatrix(title,matrix,baseRate,note,currRow,currCol){
      let html=`<div style="flex:1"><div class="sec-t">${title}</div><table class="wf-tbl"><tr><th style="background:var(--hdr)">CSAT &darr; / Adh &rarr;</th><th class="c">&lt;90%</th><th class="c">90-93%</th><th class="c">&gt;93%</th></tr>`;
      matrix.forEach(r=>{
        const isCurrRow=r.csat===currRow;
        ['r1','r2','r3'].forEach((col,idx)=>{
          const colMatch=(idx===0?'<90%':idx===1?'90-93%':'>93%')===currCol;
          const hl=isCurrRow&&colMatch;
          r[col+'_hl']=hl;
        });
        html+=`<tr><td${isCurrRow?' style="background:var(--teal-bg);font-weight:700"':''}><strong>${r.csat}</strong></td>`;
        ['r1','r2','r3'].forEach((col,idx)=>{
          const hl=r[col+'_hl'];
          const val=r[col];
          const isBase=val===baseRate;
          html+=`<td class="c"${hl?' style="background:var(--teal);color:#fff;font-weight:700;font-size:13px"':isBase?' style="background:#f8f4e8;font-weight:600"':''}>$${val.toFixed(2)}</td>`;
        });
        html+=`</tr>`;
      });
      html+=`</table><div style="font-size:10px;color:var(--subtle);margin-top:4px;font-style:italic">${note}</div></div>`;
      return html;
    }
    
    wp+=`<div class="sec-t" style="margin-top:24px">Rate Matrices (Current Position Highlighted)</div>`;
    wp+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">`;
    wp+=renderMatrix('Lagos Chat (base $13.68)',B.lagosMatrix,13.68,'Symmetric: $2 down / $2 up. Floor $11.68 / Ceiling $15.68. Lilly Lagos: <strong>$14.68</strong>','85-90%','>93% Adh');
    wp+=renderMatrix('South Africa (base $14.75)',B.saMatrix,14.75,'Floor $13.75 / Ceiling $16.75. Lilly SA: <strong>$15.50</strong>. Gastro: <strong>$14.00</strong> (Adh below 90%)','85-90%','>93% Adh');
    wp+=renderMatrix('Springfield, MO (base $35.00)',B.usMatrix,35.00,'Matrix activates May 2026. Until then: flat $35.00 base rate. Zendesk CSAT config in progress.',null,null);
    wp+=`</div>`;
    
    wp+=`<div class="co amber" style="margin-top:20px"><div class="co-l">Key Insights</div>
      <strong>Lagos ($14.68 effective, +$1 vs base):</strong> Performance is in the 85-90% CSAT / >93% adherence cell, earning +$1/hr. Push to 90%+ CSAT unlocks ceiling $15.68 (+$2/hr = +${fr(118*B.hoursPerMonth*1)}/mo).<br>
      <strong>SA Lilly ($15.50 effective, +$0.75 vs base):</strong> CSAT 85.1% / Adh 94.9% puts us at +$0.75/hr. Crossing 90% CSAT threshold earns $15.75.<br>
      <strong>Gastro ($14.00 effective, -$0.75 vs base):</strong> Only location in <strong>penalty zone</strong>. Adherence at 83.7% is the gap -- reaching 90% adh with current 85% CSAT restores base rate ($14.75) = +${fr(48*B.hoursPerMonth*0.75)}/mo opportunity.<br>
      <strong>Missouri ($35.00 flat):</strong> Matrix not active yet. At current 92.7% adherence, once CSAT is measured at 90%+, expected effective rate: $36.25 (+$1.25/hr = +${fr(124*B.hoursPerMonth*1.25)}/mo upside).
    </div>`;
    
    wp+=`<div class="co teal" style="margin-top:12px"><div class="co-l">Total Upside Opportunity</div>Hitting ceiling rates across Lagos, SA, and MO (once active) would add <strong>+${fr((118*1)+(85*1.25)+(48*0.75)+(124*1.25))*B.hoursPerMonth}/month</strong> vs. base. This represents the maximum performance-earned ceiling under the current matrix framework.</div>`;
    
    wp+=`</div>`;
    
    // ===== AGENT PERFORMANCE TAB =====
    wp+=`<div id="wf-agents" style="display:none">
      <div class="dw-hdr">TOP AGENT PERFORMANCE BY LOCATION &middot; GIFTHEALTH LILLY &middot; WEEK 16</div>
      <div class="co teal"><div class="co-l">Data Source</div>Top performers by location pulled from Lilly Performance by Vendor dataset. Showing top 5 agents by CSAT per site. Cape Town + Johannesburg = Lilly SA. Lagos includes all 3 Lagos waves.</div>`;
    
    ['Cape Town','Johannesburg','Lagos'].forEach(loc=>{
      const agents=GH_TOP_AGENTS[loc];
      if(!agents)return;
      wp+=`<div class="sec-t" style="margin-top:16px">${loc} -- Top 5 Performers</div>
      <table class="wf-tbl"><tr><th>Agent</th><th class="c">Adherence</th><th class="c">CSAT</th><th class="c">Cases/Wk</th><th class="c">Status</th></tr>`;
      agents.forEach(a=>{
        let status='<span class="badge ot">TOP PERFORMER</span>';
        if(a.csat>=95)status='<span class="badge ot">&#128293; CSAT ELITE</span>';
        else if(a.cases>120)status='<span class="badge ot">&#128640; HIGH VOLUME</span>';
        else if(a.adh>=98)status='<span class="badge ot">&#127942; ADHERENCE STAR</span>';
        wp+=`<tr><td><strong>${a.name}</strong></td><td class="c">${a.adh}%</td><td class="c" style="color:${a.csat>=90?'var(--green)':'var(--amber)'};font-weight:700">${a.csat}%</td><td class="c">${a.cases}</td><td class="c">${status}</td></tr>`;
      });
      wp+=`</table>`;
    });
    wp+=`</div>`;
  }
  
  let h=`<div class="p-hdr"><div class="bc"><button class="back-btn" onclick="showP()">&larr; Portfolio</button><a onclick="showP()">Portfolio</a> / <a onclick="rOP('${id}')">${p.n}</a> / Detail</div><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="p-title">${p.n} -- Detail View</div><div class="p-sub">${p.ind} &middot; ${p.loc} &middot; PM: ${p.pm} &middot; <strong>${PERIOD_SHORT}</strong></div></div><div style="text-align:center">${gl(p.h)}<div style="font-size:10px;color:var(--muted)">Score: ${p.h||'--'}</div></div></div></div><div class="p-tabs">${tabs}</div><div class="p-tabs" style="border-top:none;background:var(--card)">${wt}</div><div class="p-body">${wp}</div>`;
  document.getElementById('mp').innerHTML=h;
  if(id==='gh'&&typeof Chart!=='undefined'){setTimeout(()=>{initGHCharts()},150)}
}

function initGHCharts(){
  const weeks=['W07','W09','W11','W13','W14','W15','W16'];
  const csatLagos=[84.8,86.2,88.2,87.0,80.6,89.5,89.7];
  const csatSA=[96.8,92.1,88.2,89.0,80.6,89.5,93.7];
  const adhLagos=[96.5,97.2,97.8,97.5,98.0,97.9,98.0];
  const adhSA=[95.5,94.8,95.0,94.5,94.9,95.2,94.9];
  const adhMO=[93.5,93.2,93.0,92.8,92.7,92.9,92.7];
  
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:10},boxWidth:12,padding:12}}},scales:{y:{grid:{color:'#eee'},ticks:{font:{family:'DM Mono',size:9}}},x:{grid:{display:false},ticks:{font:{family:'DM Mono',size:9}}}}};
  
  const c1=document.getElementById('ghCsatChart');
  if(c1){new Chart(c1.getContext('2d'),{type:'line',data:{labels:weeks,datasets:[
    {label:'Hugo: S. Africa',data:csatSA,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.08)',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#3b82f6'},
    {label:'Hugo: Lagos',data:csatLagos,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.08)',fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:'#f59e0b'}
  ]},options:{...base,scales:{...base.scales,y:{...base.scales.y,min:70,max:100,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}}})}
  
  const c2=document.getElementById('ghAdhChart');
  if(c2){new Chart(c2.getContext('2d'),{type:'line',data:{labels:weeks,datasets:[
    {label:'Hugo: S. Africa',data:adhSA,borderColor:'#3b82f6',fill:false,tension:0.3,pointRadius:4,pointBackgroundColor:'#3b82f6'},
    {label:'Hugo: Lagos',data:adhLagos,borderColor:'#f59e0b',fill:false,tension:0.3,pointRadius:4,pointBackgroundColor:'#f59e0b'},
    {label:'Hugo: Missouri',data:adhMO,borderColor:'#ef4444',fill:false,tension:0.3,pointRadius:4,pointBackgroundColor:'#ef4444'}
  ]},options:{...base,scales:{...base.scales,y:{...base.scales.y,min:85,max:100,ticks:{...base.scales.y.ticks,callback:v=>v+'%'}}}}})}
}

function swf(pid,tid,btn){document.querySelectorAll('[id^="wf-"]').forEach(e=>e.style.display='none');document.getElementById('wf-'+tid).style.display='block';btn.parentElement.querySelectorAll('.p-tab').forEach(t=>t.classList.remove('act'));btn.classList.add('act')}

// INIT
rSB();showP();
</script>
</body>
</html>
